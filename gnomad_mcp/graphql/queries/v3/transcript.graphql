query transcript($transcript_id: String!, $reference_genome: ReferenceGenomeId!) {
    transcript(transcript_id: $transcript_id, reference_genome: $reference_genome) {
        reference_genome
        transcript_id
        transcript_version
        chrom
        start
        stop
        strand
        gene_id
        gene {
            reference_genome
            gene_id
            gene_version
            symbol
            hgnc_id
            name
            chrom
            start
            stop
            strand
            canonical_transcript_id
            mane_select_transcript {
                ensembl_id
                ensembl_version
                refseq_id
                refseq_version
            }
        }
        exons {
            feature_type
            start
            stop
        }
    }
}