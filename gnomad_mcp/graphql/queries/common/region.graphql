query region($chrom: String!, $start: Int!, $stop: Int!, $reference_genome: ReferenceGenomeId!) {
    region(chrom: $chrom, start: $start, stop: $stop, reference_genome: $reference_genome) {
        reference_genome
        chrom
        start
        stop
        genes {
            gene_id
            symbol
            start
            stop
        }
        clinvar_variants {
            variant_id
            clinical_significance
            gold_stars
            major_consequence
            pos
            review_status
        }
    }
}