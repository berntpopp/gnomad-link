query variant($variantId: String!, $dataset: DatasetId!) {
    variant(variantId: $variantId, dataset: $dataset) {
        variant_id
        chrom
        pos
        ref
        alt
        rsid
        exome {
            ac
            an
            af
            homozygote_count
            hemizygote_count
            filters
            populations {
                id
                ac
                an
                homozygote_count
                hemizygote_count
            }
        }
        genome {
            ac
            an
            af
            homozygote_count
            hemizygote_count
            filters
            populations {
                id
                ac
                an
                homozygote_count
                hemizygote_count
            }
        }
        flags
        in_silico_predictors {
            id
            value
            flags
        }
        transcript_consequences {
            canonical
            gene_id
            gene_symbol
            hgvs
            hgvsc
            hgvsp
            lof
            lof_filter
            lof_flags
            major_consequence
            consequence_terms
        }
    }
}