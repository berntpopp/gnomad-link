#import "./fragments.graphql"

query mitochondrial_variant($variant_id: String!, $dataset: DatasetId!) {
    mitochondrial_variant(variant_id: $variant_id, dataset: $dataset) {
        variant_id
        reference_genome
        pos
        ref
        alt
        rsid
        rsids
        filters
        flags
        an
        ac_het
        ac_hom
        ac_hom_mnv
        excluded_ac
        max_heteroplasmy
        mitotip_score
        mitotip_trna_prediction
        pon_ml_probability_of_pathogenicity
        pon_mt_trna_prediction
        haplogroup_defining
        populations {
            id
            an
            ac_het
            ac_hom
            heteroplasmy_distribution {
                bin_edges
                bin_freq
                n_larger
                n_smaller
            }
        }
        haplogroups {
            id
            an
            ac_het
            ac_hom
            faf
            faf_hom
        }
        age_distribution {
            het {
                bin_edges
                bin_freq
                n_smaller
                n_larger
            }
            hom {
                bin_edges
                bin_freq
                n_smaller
                n_larger
            }
        }
        heteroplasmy_distribution {
            bin_edges
            bin_freq
            n_larger
            n_smaller
        }
        site_quality_metrics {
            name
            value
        }
        genotype_quality_metrics {
            name
            all {
                bin_edges
                bin_freq
                n_larger
                n_smaller
            }
            alt {
                bin_edges
                bin_freq
                n_larger
                n_smaller
            }
        }
        genotype_quality_filters {
            name
            filtered {
                bin_edges
                bin_freq
                n_larger
                n_smaller
            }
        }
        transcript_consequences {
            canonical
            is_canonical
            is_mane_select
            is_mane_select_version
            gene_id
            gene_version
            gene_symbol
            transcript_id
            transcript_version
            hgvs
            hgvsc
            hgvsp
            lof
            lof_filter
            lof_flags
            major_consequence
            consequence_terms
            domains
            refseq_id
            refseq_version
            polyphen_prediction
            sift_prediction
        }
    }
}