query mitochondrial_variant($dataset: DatasetId!, $variant_id: String!) {
    mitochondrial_variant(dataset: $dataset, variant_id: $variant_id) {
        variant_id
        reference_genome
        chrom
        pos
        ref
        alt
        rsid
        filters
        an
        ac
        ac_het
        ac_hom
        max_heteroplasmy
        populations {
            id
            an
            ac
            ac_het
            ac_hom
        }
        age_distribution {
            het {
                bin_edges
                bin_freq
                n_smaller
                n_larger
            }
            hom {
                bin_edges
                bin_freq
                n_smaller
                n_larger
            }
        }
        qualityMetrics {
            MQ
            VD
            FMF
        }
        transcript_consequences {
            canonical
            gene_id
            gene_symbol
            hgvs
            hgvsc
            hgvsp
            lof
            lof_filter
            lof_flags
            major_consequence
            consequence_terms
        }
    }
}