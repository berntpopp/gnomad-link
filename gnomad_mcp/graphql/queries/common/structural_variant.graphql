#import "./fragments.graphql"

query structural_variant($dataset: StructuralVariantDatasetId!, $variant_id: String!) {
    structural_variant(dataset: $dataset, variant_id: $variant_id) {
        ...StructuralVariantFields
        chrom2
        pos2
        end2
        alts
        algorithms
        copy_number
        cpx_intervals
        cpx_type
        evidence
        filters
        populations {
            id
            ac
            an
            ac_hom
        }
        quality_metrics {
            af
            ac
            an
            ac_hom
        }
    }
}