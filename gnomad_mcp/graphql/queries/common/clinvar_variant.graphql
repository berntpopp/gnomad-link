#import "./fragments.graphql"

query clinvar_variant($variant_id: String!, $reference_genome: ReferenceGenomeId!) {
    clinvar_variant(variant_id: $variant_id, reference_genome: $reference_genome) {
        ...ClinVarVariantFields
        clinvar_variation_id
        gnomad {
            exome {
                ac
                an
                filters
            }
            genome {
                ac
                an
                filters
            }
        }
        gold_stars
        in_gnomad
        last_evaluated
        rsids
        submissions {
            ...ClinVarSubmissionFields
            conditions {
                name
                medgen_id
            }
        }
    }
}