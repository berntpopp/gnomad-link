query gene_carrier_variants(
    $gene_id: String
    $gene_symbol: String
    $dataset: DatasetId!
    $reference_genome: ReferenceGenomeId!
) {
    gene(gene_id: $gene_id, gene_symbol: $gene_symbol, reference_genome: $reference_genome) {
        gene_id
        symbol
        variants(dataset: $dataset) {
            variant_id
            pos
            ref
            alt
            flags
            transcript_consequence {
                transcript_id
                is_canonical
                is_mane_select
                lof
                major_consequence
                consequence_terms
            }
            exome {
                ac
                an
                homozygote_count
                filters
                populations {
                    id
                    ac
                    an
                    homozygote_count
                }
            }
            genome {
                ac
                an
                homozygote_count
                filters
                populations {
                    id
                    ac
                    an
                    homozygote_count
                }
            }
            joint {
                ac
                an
                homozygote_count
                filters
                populations {
                    id
                    ac
                    an
                    homozygote_count
                }
            }
        }
        clinvar_variants {
            variant_id
            clinical_significance
            review_status
            gold_stars
        }
    }
}
