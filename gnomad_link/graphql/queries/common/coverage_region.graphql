query region_coverage(
    $chrom: String!
    $start: Int!
    $stop: Int!
    $reference_genome: ReferenceGenomeId!
    $dataset: DatasetId!
) {
    region(chrom: $chrom, start: $start, stop: $stop, reference_genome: $reference_genome) {
        chrom
        start
        stop
        coverage(dataset: $dataset) {
            exome {
                pos
                mean
                median
                over_1
                over_5
                over_10
                over_15
                over_20
                over_25
                over_30
                over_50
                over_100
            }
            genome {
                pos
                mean
                median
                over_1
                over_5
                over_10
                over_15
                over_20
                over_25
                over_30
                over_50
                over_100
            }
        }
    }
}
