query gene_coverage(
    $gene_id: String
    $gene_symbol: String
    $reference_genome: ReferenceGenomeId!
    $dataset: DatasetId
) {
    gene(gene_id: $gene_id, gene_symbol: $gene_symbol, reference_genome: $reference_genome) {
        gene_id
        symbol
        coverage(dataset: $dataset) {
            exome {
                pos
                mean
                median
                over_1
                over_5
                over_10
                over_15
                over_20
                over_25
                over_30
                over_50
                over_100
            }
            genome {
                pos
                mean
                median
                over_1
                over_5
                over_10
                over_15
                over_20
                over_25
                over_30
                over_50
                over_100
            }
        }
    }
}
