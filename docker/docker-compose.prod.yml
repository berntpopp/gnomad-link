# Production overlay.
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  gnomad-link:
    environment:
      LOG_LEVEL: INFO
      MCP_TRANSPORT: unified

    volumes: []
    ports: !reset []

    read_only: true
    tmpfs:
      - /tmp/gnomad-link:rw,noexec,nosuid,size=64m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    pids_limit: 256
    init: true

    command: ["gnomad-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 256
        reservations:
          memory: 256M
          cpus: "0.25"

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gnomad-link,environment=production"
