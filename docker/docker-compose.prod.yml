# Production overlay.
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  gnomad-link:
    build: !reset null
    image: ${GNOMAD_LINK_IMAGE:?set a verified digest-addressed image}
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    environment:
      LOG_LEVEL: INFO
      MCP_TRANSPORT: unified
      MCP_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","gnomad-link.genefoundry.org"]'
      GF_HEALTHCHECK_HOST: localhost

    volumes: !override []
    ports: !reset []
    expose:
      - "8000"

    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777

    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL

    init: true

    command: !reset null

    deploy: !override
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 256
    restart: on-failure

    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - 'curl -f -H "Host: $${GF_HEALTHCHECK_HOST}" http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gnomad-link,environment=production"
