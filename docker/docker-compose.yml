name: gnomad-link

services:
  gnomad-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: gnomad_link_server

    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false

    environment:
      LOG_LEVEL: INFO
      MCP_TRANSPORT: unified
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp

    ports:
      - "${GNOMAD_LINK_HOST_PORT:-8020}:8000"

    command: ["gnomad-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
