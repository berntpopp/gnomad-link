# Nginx Proxy Manager overlay.
# Usage: docker compose --env-file .env.docker -f docker/docker-compose.yml -f docker/docker-compose.prod.yml -f docker/docker-compose.npm.yml up -d

services:
  gnomad-link:
    ports: !reset []
    expose:
      - "8000"
    networks:
      - default
      - npm-network

networks:
  default:
  npm-network:
    external: true
    # Default matches the NPM container's network on the GeneFoundry VPS so the
    # reverse proxy can reach this container out of the box; override via
    # NPM_NETWORK_NAME in .env.docker if your proxy network differs.
    name: ${NPM_NETWORK_NAME:-npm_default}
