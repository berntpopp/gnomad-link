# Nginx Proxy Manager overlay.
# Usage: docker compose --env-file .env.docker -f docker/docker-compose.yml -f docker/docker-compose.prod.yml -f docker/docker-compose.npm.yml up -d

services:
  gnomad-link:
    # `docker-compose.prod.yml` sets `container_name: !reset null`, which is right for the
    # standalone production stack it targets. The NPM topology cannot tolerate it: Nginx
    # Proxy Manager routes by forwarding to a HOSTNAME on the shared npm network, and that
    # hostname is the CONTAINER NAME — the live proxy host emits
    # `proxy_pass http://gnomad_link_server:8000;`. With the name reset, Compose would name
    # the container `gnomad-link-gnomad-link-1`, NPM could not resolve `gnomad_link_server`,
    # and gnomad-link.genefoundry.org would 502. The management tooling
    # (config/projects.yaml -> `containers:`) also addresses this container by name.
    # So the NPM overlay must UNDO prod.yml's reset.
    container_name: gnomad_link_server

    ports: !reset []
    expose:
      - "8000"
    networks:
      - default
      - npm-network

networks:
  default:
  npm-network:
    external: true
    # Default matches the NPM container's network on the GeneFoundry VPS so the
    # reverse proxy can reach this container out of the box; override via
    # NPM_NETWORK_NAME in .env.docker if your proxy network differs.
    name: ${NPM_NETWORK_NAME:-npm_default}
