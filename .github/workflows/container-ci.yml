name: Container CI

on:
  pull_request:
    paths:
      - gnomad_link/**
      - docker/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - container-release.json
      - .github/workflows/container-ci.yml
  push:
    branches:
      - main
    paths:
      - gnomad_link/**
      - docker/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - container-release.json
      - .github/workflows/container-ci.yml

concurrency:
  group: container-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-ci:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-ci.yml@0a625fc37561b1131d7cd8e446ac28a387f52eec
