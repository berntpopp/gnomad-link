name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-validation:
    name: Release validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          version: "0.8.7"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(uv run python -c 'import gnomad_link; print(gnomad_link.__version__)')"
          echo "git tag: ${TAG}"
          echo "package version: ${PKG}"
          if [ "${TAG}" != "${PKG}" ]; then
            echo "::error::Git tag (${TAG}) does not match package version (${PKG}). Bump [project].version in pyproject.toml before tagging."
            exit 1
          fi

      - name: Run local CI checks
        run: make ci-local

      - name: Validate production Compose config
        run: make docker-prod-config

      - name: Validate NPM Compose config
        run: make docker-npm-config

      - name: Build release Docker image
        run: docker build -f docker/Dockerfile -t gnomad-link:release .
