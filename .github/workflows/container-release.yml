name: Container release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: container-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-release.yml@0a625fc37561b1131d7cd8e446ac28a387f52eec
