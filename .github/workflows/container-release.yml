name: Container release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: container-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-release.yml@ddac098c57ac9a020a46ebb1897185e35fd00168
